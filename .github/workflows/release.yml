name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mercury-windows
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mercury-linux
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mercury-macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build Tauri (Windows)
        if: runner.os == 'Windows'
        run: npx tauri build --bundles msi,nsis

      - name: Build Tauri (Linux)
        if: runner.os == 'Linux'
        run: npx tauri build --bundles deb

      - name: Build Tauri (macOS)
        if: runner.os == 'macOS'
        run: npx tauri build --bundles dmg

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          case "${{ runner.os }}" in
            Windows) GLOB="src-tauri/target/release/bundle/msi/*.msi src-tauri/target/release/bundle/nsis/*.exe" ;;
            Linux)   GLOB="src-tauri/target/release/bundle/deb/*.deb" ;;
            macOS)   GLOB="src-tauri/target/release/bundle/dmg/*.dmg" ;;
          esac
          ls -la $GLOB || true
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" $GLOB --title "Release $TAG" --generate-notes
          else
            gh release upload "$TAG" $GLOB
          fi
