name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mercury-windows
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mercury-linux
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mercury-macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: |
            ## Mercury ${{ github.ref_name }}

            ### Installation
            - **Windows**: Download `Mercury_*_x64-setup.exe` and run it
            - **Linux**: Download `mercury_*.deb` and install with `sudo dpkg -i mercury_*.deb`
            - **macOS**: Download `Mercury_*_aarch64.dmg`

            ### Platform Requirements
            - Windows 10/11: WebView2 is pre-installed, no extra setup needed
            - Linux: Requires `libwebkit2gtk-4.1-0` and `libgtk-3-0`
            - macOS: Requires macOS 12.0 or later

            ### AI Features
            AI features (summary, translation, tagging) require an OpenAI-compatible API key configured in app settings.
          releaseDraft: false
          prerelease: false
